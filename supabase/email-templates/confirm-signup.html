<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; background-color: #0a0f1e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { max-width: 480px; margin: 0 auto; padding: 40px 20px; }
    .card { background: #111827; border-radius: 12px; padding: 32px; border: 1px solid rgba(255,255,255,0.1); }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo span { font-size: 24px; font-weight: bold; background: linear-gradient(135deg, #10B981, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h1 { color: #f8fafc; font-size: 20px; margin: 0 0 8px; text-align: center; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin: 0 0 16px; text-align: center; }
    .button { display: block; text-align: center; background: linear-gradient(135deg, #059669, #0d9488); color: white; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; margin: 24px 0; }
    .footer { text-align: center; color: #475569; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo"><span>Tracker</span></div>
      <h1>Confirm your email</h1>
      <p>Thanks for signing up! Click the button below to confirm your email address.</p>
      <a href="{{ .ConfirmationURL }}" class="button">Confirm Email</a>
      <p>If you didn't create an account, you can safely ignore this email.</p>
    </div>
    <div class="footer">
      <p>Tracker — Track the things you love</p>
    </div>
  </div>
</body>
</html>
